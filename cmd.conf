# Always enable this
Master = master

# Force cmdaemon to run in slave mode, no mysql connection will be established to determine the mode
# ForceSlave = true

# Force compute node to run with minimal data: less memory / network traffic
# This option cannot be used for nodes running Bright-managed 3rd party tools: WLM / Kube / ...
# ForceMinimalData = true

# Ports
Port = 8080
SSLPort = 8081
SSLPortOnly = no

# SSL Parameters
CertificateFile = "/cm/local/apps/cmd/etc/cert.pem"
PrivateKeyFile = "/cm/local/apps/cmd/etc/cert.key"
CACertificateFile = "/cm/local/apps/cmd/etc/cacert.pem"
RandomSeedFile = "/dev/urandom"
RandomSeedFileSize = 8192
DHParamFile = "/cm/local/apps/cmd/etc/dh1024.pem"
SSLHandshakeTimeout = 10
SessionCacheExpirationTime = 3600

# Uncomment to disallow users without a certificate to log into the portal
# DefaultCertificateFile=""
# DefaultPrivateKeyFile=""

# Database parameters
DBHost = "localhost"
DBPort = 3306
DBUser = "cmdaemon"
DBPass = "vP4qHi1XzEtdES2L"
DBName = "cmdaemon"
# DBUnixSocket = "/var/run/mysqld/mysqld.sock"
# DBUnixSocket = "/var/run/mysqld/mysqld.sock"   # UBUNTU

EventBucket = "/var/spool/cmd/eventbucket"
EventBucketFilter = "/cm/local/apps/cmd/etc/eventbucket.filter"

# LDAP parameters
LDAPHost = "ldapserver"
LDAPUser = "root"
LDAPPass = "yZeJZEh2R17QH6hO"
LDAPReadOnlyUser = "readonlyroot"
LDAPReadOnlyPass = "ZqHRuP2o2d6FufwH"
LDAPSearchDN = "dc=cm,dc=cluster"
LDAPProtocol = "ldaps"
LDAPPort = 636
LDAPCACertificate = "/cm/local/apps/openldap/etc/certs/ca.pem"
LDAPCertificate = "/cm/local/apps/openldap/etc/certs/ldap.pem"
LDAPPrivateKey = "/cm/local/apps/openldap/etc/certs/ldap.key"

DocumentRoot = "/cm/local/apps/cmd/etc/htdocs/"
SpoolDir = "/var/spool/cmd"

# Enable Shell service for AJAX console
EnableShellService = true

# Enable the Prometheus Exporter service
# A Prometheus server can then use cmd to pull data
# To collect all data, all nodes with a monitoring role need to be added to Prometheus YAML
#
# - job_name: cmdaemon-head01
#   metrics_path: /exporter
#   static_configs:
#     - targets: ['https://head01:8081']
#
# EnablePrometheusExporterService = true
#
# Set the following if you intend to call the exporter with timestamps=yes
# This flag will instruct the cache to keep more data so intermediate timestamps
# between scapper pulls will also be returned
#
# EnablePrometheusExporterWithTimestamp = true

# Enable the Prometheus Push service
#
# cat <<EOF > "$file"
# test_prometheus_push{hello="world"} 42
# EOF
# curl -k -X POST --data-binary "@$file" https://localhost:8081/prometheuspush/job/test
#
# EnablePrometheusPushService = true

CMDaemonAudit = true
CMDaemonAuditorFile = "/var/spool/cmd/audit.log"
#CMDaemonAuditorFile = "/var/spool/cmd/audit.json"
#CMDaemonAuditorFile = "/var/spool/cmd/audit.pipe"
#CMDaemonAuditorFile = "http://<ip>:<port>/some/path"
#DisableAuditorForProfiles = { "NODE" }

EventLogger = true
EventLoggerFile = "/var/spool/cmd/events.log"
#EventLoggerFile = "/var/spool/cmd/events.json"
#EventLoggerFile = "/var/spool/cmd/events.pipe"
#EventLoggerFile = "http://<ip>:<port>/some/path"
#EventLoggerFile = "hook:/some/path/to/script"
# Multiple loggers can be specified with | between them

#TimingOverview = true
#TimingOverviewFile = "/var/spool/cmd/timing.overview.log"

# Allow DNS queries from any network
PublicDNS = false

# Maximum number of nodes to provision simultaneously.
# Note that this is the total limit, each provisioning
# role also has a limit, which is usually lower.
MaxNumberOfProvisioningThreads = 10000

# Configure BMC interface of head node automatically
SetupBMC = false

# Maximum duration of an BMC session in milliseconds
BMCSessionTimeout = 2000

# Maximum duration of an SNMP session in microseconds
SnmpSessionTimeout = 500000

# Power down PDU outlet when all connected (BMC) nodes are down?
PowerOffPDUOutlet = false

# Disable boot logo during slave boot-up
DisableBootLogo = false

# Disable all Lua code from being executed
DisableLua = false

# StoreBIOSTimeInUTC
StoreBIOSTimeInUTC = false

# Freeze modification of pbs queueconfig
FreezeChangesToPBSProConfig = false

# Freeze modification of slurm queueconfig
FreezeChangesToSlurmConfig = false

# Freeze modification of lsf queueconfig
FreezeChangesToLSFConfig = false

# To prevent configuration files from being changed, use FrozenFile.
# Example:
# FrozenFile = { "/etc/dhcpd.conf", "/etc/named.conf" }

# By default, the CMDaemon will enforce certain requirements on
# network interfaces and management / node booting networks. In heavily customized
# set-ups the user can disable these checks. It is not recommended to enable
# this in general. Default value of 0 will enable all checks, value of 1 will
# cause validation warnings to be generated, a value of 2 will completely disable
# the checks.
EaseNetworkValidation = 0

# Whenever one or more entities have changed your script will be called (after 30s)
# Use python bindings to get information current setup
# For an example see /cm/local/examples/cmd/customupdate
# CustomUpdateConfigFileScript = "/your/own/script"

# This will dump the config which can be used by 3rd party tools
# ConfigDumpPath = "/var/spool/cmd/cmdaemon.config.dump"

# Syslog to hostname
SyslogHost = "localhost"
# Using facility (one of: LOG_KERN, LOG_USER, LOG_MAIL, LOG_DAEMON, LOG_AUTH,
#                LOG_SYSLOG OR LOG_LOCAL0..7)
SyslogFacility = "LOG_LOCAL6"

# When this directive is set to true, the FQDN (as returned by the 'hostname -f' on
# the head nodes) of the head nodes is composed of the domain name of the network
# which is specified as the "external network" in the "base" partition. It also
# makes hostnames of the head nodes to be resolved to the external IPs (where possible).
# See Administrator Manual for details.
ResolveToExternalName = false

# Set one or more advanced config parameters, only do this when needed
# AdvancedConfig = { "param=value", "param=value" }

# Set extra environment variable to all scripts called by cmdaemon, for example proxy settings
# ScriptEnvironment = { "http_proxy=http://my:pass@my.proxy:8080", "https_proxy=http://my:pass@my.proxy:8080", "ftp_proxy=http://my:pass@my.proxy:8080" }

#Include("/path/to/file/to/include")
