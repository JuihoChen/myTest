# This file was automatically generated by cmd. Do not edit manually!
not authoritative;
ddns-update-style             none;
default-lease-time            100800;
use-host-decl-names           on;

option reboottime code 211 = unsigned integer 32;
# For UEFI boot
option architecture-type code 93 = unsigned integer 16;
# Add these three options to enable the options so that you can point categories of nodes to a specific pxelinux config file
option magic      code 208 = string;
option configfile code 209 = text;
option pathprefix code 210 = text;

# ZTP of Cumulus switches
option cumulus-provision-url code 239 = text;
# Cumulus switch image pulled by ONIE
option default-url           code 114 = text;


option magic f1:00:74:7e;
if exists dhcp-parameter-request-list {
# Always send the PXELINUX options (specified in hexadecimal, ie: 208 = 0xd0, 209 = 0xd1, etc.)
option dhcp-parameter-request-list = concat(option dhcp-parameter-request-list,d0,d1,d2,d3);
}

group { # begin ipminet0.cluster
  option domain-name            "cm.cluster";
  option domain-search          "cm.cluster", "ipminet0.cluster", "eth.cluster", "nvidia.com", "pega.local";
  option domain-name-servers    172.19.134.254;
  option subnet-mask            255.255.255.0;
  option broadcast-address      172.19.129.255;
  option routers                172.19.129.1;
  option reboottime             60;
  next-server                   172.19.134.254;

  include "/etc/dhcpd.ipminet0.conf";
  subnet 172.19.129.0 netmask 255.255.255.0 {
    pool {
      range 172.19.129.80 172.19.129.100;
      max-lease-time 100800;
      option interface-mtu 9000;
      if option architecture-type = 00:09
          or option architecture-type = 00:07 {
        option pathprefix "http://172.19.134.254:8080/tftpboot/x86_64/efi64/";
        option configfile "pxelinux.cfg/category.dgx";
        filename "x86_64/efi64/syslinux.efi";
      } elsif option architecture-type = 00:0b {
        option pathprefix "http://172.19.134.254:8080/tftpboot/aarch64/";
        option configfile "grub.cfg/category.gb200";
        filename "aarch64/grub2.efi";
      } else {
        option pathprefix "http://172.19.134.254:8080/tftpboot/x86_64/bios/";
        option configfile "pxelinux.cfg/category.dgx";
        filename "x86_64/bios/lpxelinux.0";
      }
    }
  }
} # end ipminet0.cluster

